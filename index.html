<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>復健技術課 · 工具站</title>
<style>
:root{
  --paper:#FAF9F6; --ink:#1F2A2A; --teal:#0E5A5A; --teal-soft:#E3EFEE;
  --line:#D8D5CC; --amber:#B07A1E; --mid:#F2F1EA; --mid-text:#5A5A4F;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
  background:var(--paper); color:var(--ink); min-height:100vh;
  display:flex; flex-direction:column; align-items:center;
  padding:32px 20px 48px;
}
.wrap{width:100%; max-width:680px;}
header{display:flex; align-items:center; gap:16px; padding-bottom:20px; border-bottom:2px solid var(--teal); margin-bottom:8px;}
header img{height:64px; width:64px; object-fit:contain;}
.eyebrow{font-size:.78rem; letter-spacing:.18em; color:var(--teal); font-weight:700;}
h1{font-size:1.55rem; font-weight:800; letter-spacing:.04em; line-height:1.3;}
.sub{font-size:.82rem; color:var(--mid-text); margin-top:2px;}
section{margin-top:28px;}
.sec-label{display:flex; align-items:baseline; gap:10px; margin-bottom:12px;}
.sec-label b{font-size:.95rem; letter-spacing:.12em; color:var(--teal);}
.sec-label span{flex:1; border-top:1px solid var(--line); transform:translateY(-3px);}
.card{
  display:flex; align-items:center; gap:14px;
  background:#fff; border:1px solid var(--line); border-left:6px solid var(--teal);
  border-radius:12px; padding:16px 18px; margin-bottom:12px;
  text-decoration:none; color:var(--ink);
  transition:transform .08s ease, box-shadow .08s ease;
  min-height:72px;
}
.card:active{transform:scale(.985);}
@media(hover:hover){ .card:hover{box-shadow:0 3px 12px rgba(14,90,90,.12); transform:translateY(-1px);} }
.card .txt{flex:1; min-width:0;}
.card .name{font-size:1.08rem; font-weight:700;}
.card .desc{font-size:.82rem; color:var(--mid-text); margin-top:3px; line-height:1.5;}
.card .arrow{color:var(--teal); font-size:1.2rem; flex-shrink:0;}
.card.disabled{
  border-left-color:var(--line); background:var(--mid); cursor:default;
}
.card.disabled .name{color:var(--mid-text);}
.card.disabled .arrow{display:none;}
.chip{
  flex-shrink:0; font-size:.7rem; font-weight:700; letter-spacing:.06em;
  padding:3px 9px; border-radius:99px;
  background:#FBF3E2; color:var(--amber); border:1px solid #E8D5AC;
}
footer{margin-top:36px; font-size:.75rem; color:var(--mid-text); text-align:center; line-height:1.8;}
@media(prefers-reduced-motion:reduce){ .card{transition:none;} }
</style>
</head>

      <h1>復健技術課 · 工具站</h1>
      <div class="sub">課內工具共同入口 · 將本頁加入主畫面即可快速使用</div>
    </div>
  </header>

  <div id="toolList"></div>

  <footer>
    雲林基督教醫院 復健技術課 · 內部工具<br>
    頁面有問題請洽課內管理者
  </footer>
</div>

<script>
/* =====================================================
   【新增工具只要改這裡】
   往對應 group 的 items 裡複製一個物件即可：
   { name:"工具名稱", desc:"一句說明", url:"https://...", ready:true }
   ready 設 false 會顯示「建置中」的灰色卡片（不可點）。
   ===================================================== */
const GROUPS = [
  {
    label: "教學評核",
    items: [
      { name: "臨床評估表單", desc: "Mini-CEX / Splint-DOPS / 評估工具 DOPS，支援 AI 整理回饋與 PDF 匯出",
        url: "https://lightgreen93.github.io/Checklist/", ready: true },
      { name: "EPA 評估量表", desc: "各職類 EPA 表單（規劃中）",
        url: "", ready: false },
    ]
  },
  {
    label: "行政與臨床工具",
    items: [
      { name: "副木採購系統", desc: "副木耗材的採購與管理",
        url: "https://lightgreen93.github.io/splint/", ready: true },
      { name: "年齡計算器", desc: "依出生日期快速換算實足年齡",
        url: "https://lightgreen93.github.io/OT_chien/", ready: true },
    ]
  },
  {
    label: "建置中",
    items: [
      { name: "圖書管理系統", desc: "課內書籍借閱與清點（規劃中）",
        url: "", ready: false },
    ]
  },
];

const root = document.getElementById("toolList");
GROUPS.forEach(g => {
  if(!g.items.length) return;
  const sec = document.createElement("section");
  sec.innerHTML = `<div class="sec-label"><b>${g.label}</b><span></span></div>`;
  g.items.forEach(t => {
    const el = document.createElement(t.ready ? "a" : "div");
    el.className = "card" + (t.ready ? "" : " disabled");
    if(t.ready) el.href = t.url;
    el.innerHTML = `
      <div class="txt">
        <div class="name">${t.name}</div>
        <div class="desc">${t.desc}</div>
      </div>
      ${t.ready ? '<div class="arrow">→</div>' : '<span class="chip">建置中</span>'}`;
    sec.appendChild(el);
  });
  root.appendChild(sec);
});
</script>
